name: Build and deploy Jekyll site to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
      - name: Inject API keys
        run: |
          mkdir -p _data
          printf 'google_maps: %s\n' "${{ secrets.GOOGLE_MAPS_API_KEY }}" > _data/api_keys.yml
      - name: Rewrite asset URLs to R2 CDN
        if: vars.CDN_URL != ''
        env:
          CDN: ${{ vars.CDN_URL }}
        run: |
          set -e
          echo "Rewriting /assets/wp-content/ -> $CDN/wp-content/"
          # Strip trailing slash from CDN
          CDN="${CDN%/}"
          esc=$(printf '%s' "$CDN" | sed -e 's/[\/&|]/\\&/g')
          # Files where references can appear (skip assets/* and binaries)
          mapfile -t targets < <(grep -rlF "/assets/wp-content/" \
            _posts _pages _layouts _includes _config.yml index.html 2>/dev/null || true)
          if [ ${#targets[@]} -eq 0 ]; then
            echo "No occurrences found; nothing to rewrite."
            exit 0
          fi
          printf '%s\n' "${targets[@]}" | xargs sed -i "s|/assets/wp-content/|$esc/wp-content/|g"
          echo "Rewrote ${#targets[@]} files."
      - name: Build site
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
